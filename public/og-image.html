<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            position: relative;
            overflow: hidden;
        }
        .glow-1 {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        .glow-2 {
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 60px;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(251, 191, 36, 0.3);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #0f172a;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.4);
        }
        h1 {
            font-size: 90px;
            font-weight: 900;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(251, 191, 36, 0.5);
            line-height: 1.1;
        }
        .subtitle {
            font-size: 36px;
            color: #e2e8f0;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .date {
            font-size: 28px;
            color: #cbd5e1;
            font-weight: 500;
            padding: 15px 40px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 15px;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }
    </style>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="content">
        <div class="badge">Безплатен Уебинар</div>
        <h1>3-DAY<br/>LIVE<br/>CHALLENGE</h1>
        <div class="subtitle">Real Estate Mastery</div>
        <div class="date">С Иво Димовски</div>
    </div>
</body>
</html>
