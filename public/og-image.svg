<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Glow effects -->
  <circle cx="1100" cy="100" r="200" fill="#fbbf24" opacity="0.1" filter="blur(80px)"/>
  <circle cx="100" cy="530" r="250" fill="#fbbf24" opacity="0.08" filter="blur(100px)"/>

  <!-- Content Box -->
  <rect x="150" y="80" width="900" height="470" rx="30" fill="rgba(30, 41, 59, 0.6)"
        stroke="#fbbf24" stroke-width="2" opacity="0.8"/>

  <!-- Badge -->
  <rect x="420" y="130" width="360" height="50" rx="25" fill="url(#badgeGradient)"/>
  <text x="600" y="163" font-family="Arial, sans-serif" font-size="20" font-weight="800"
        fill="#0f172a" text-anchor="middle" letter-spacing="2">БЕЗПЛАТЕН УЕБИНАР</text>

  <!-- Main Title -->
  <text x="600" y="250" font-family="Arial, sans-serif" font-size="85" font-weight="900"
        fill="#fbbf24" text-anchor="middle" letter-spacing="4" filter="url(#glow)">3-DAY</text>
  <text x="600" y="330" font-family="Arial, sans-serif" font-size="85" font-weight="900"
        fill="#fbbf24" text-anchor="middle" letter-spacing="4" filter="url(#glow)">LIVE</text>
  <text x="600" y="410" font-family="Arial, sans-serif" font-size="85" font-weight="900"
        fill="#fbbf24" text-anchor="middle" letter-spacing="4" filter="url(#glow)">CHALLENGE</text>

  <!-- Subtitle -->
  <text x="600" y="465" font-family="Arial, sans-serif" font-size="32" font-weight="600"
        fill="#e2e8f0" text-anchor="middle" letter-spacing="1">Real Estate Mastery</text>

  <!-- Date Box -->
  <rect x="440" y="490" width="320" height="50" rx="15" fill="rgba(15, 23, 42, 0.5)"
        stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  <text x="600" y="523" font-family="Arial, sans-serif" font-size="26" font-weight="500"
        fill="#cbd5e1" text-anchor="middle">С Иво Димовски</text>
</svg>